version: '3.8'

services:
  app:
    build: .
    container_name: assis-ia-backend
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    container_name: assis-ia-redis
    ports:
      - "6379:6379"
    restart: always
